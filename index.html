<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12 Мамыр – Халықаралық Мейіргерлер Күні</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Cormorant+Garamond:ital,wght@1,500;1,600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red:#d62b3a;
  --navy:#0b1e38;
  --blue:#1a6fa4;
  --blue-mid:#2596be;
  --sky1:#c2e5f8;
  --sky2:#a0d4f0;
  --sky3:#7cbce8;
  --light-bg:#eaf6fd;
  --white:#ffffff;
  --text:#0b1e38;
  --muted:#3a5068;
}

body {
  font-family: 'Nunito', sans-serif;
  color: var(--text);
  background: var(--white);
  width: 100%;
}

/* HERO */
.hero {
  background: linear-gradient(160deg,var(--sky1),var(--sky3));
  border-bottom: 5px solid var(--red);
  text-align: center;
  padding: 50px 20px;
}

.hero-badge {
  display:inline-block;
  padding:5px 12px;
  border-radius:20px;
  background:rgba(214,43,58,0.1);
  color:var(--red);
  font-weight:800;
  font-size:10px;
  margin-bottom:10px;
}

.hero-date {
  font-size:40px;
  font-weight:900;
  color:var(--red);
}

.hero-title {
  font-size:26px;
  font-weight:900;
  margin:10px 0;
}

.hero-sub {
  font-style:italic;
  margin-bottom:10px;
}

.hero-body {
  font-size:14px;
  color:var(--muted);
}

/* CARDS */
.gratitude { background: var(--light-bg); }

.g-card {
  padding:25px;
  border-bottom:1px solid #ddd;
}

.g-title {
  font-size:20px;
  color:var(--blue);
  margin-bottom:10px;
}

.g-text {
  font-size:14px;
}

/* QUALITIES */
.qualities {
  padding:30px 20px;
  text-align:center;
}

.pills {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.pill {
  padding:10px 16px;
  border-radius:20px;
  background:var(--light-bg);
  font-weight:700;
}

/* WISHES */
.wishes {
  background: linear-gradient(145deg,var(--navy),var(--blue-mid));
  color:white;
  padding:30px 20px;
  text-align:center;
}

.wishes-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.w-card {
  padding:15px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
}

/* FOOTER */
.footer {
  background:#000;
  color:#aaa;
  text-align:center;
  padding:15px;
  font-size:12px;
}

/* MOBILE */
@media(max-width:480px){
  .hero-date{font-size:30px;}
  .hero-title{font-size:20px;}
  .hero-body{font-size:13px;}
}
</style>
</head>

<body>

<header class="hero">
  <div class="hero-badge">Мереке</div>
  <div class="hero-date">12 Мамыр</div>
  <div class="hero-title">Халықаралық Мейіргерлер Күні</div>
  <div class="hero-sub">Жүрек жылуын сыйлайтын жандарға</div>
  <div class="hero-body">
    Сіздердің еңбектеріңіз – адам өмірінің ең маңызды тірегі.
  </div>
</header>

<section class="gratitude">
  <div class="g-card">
    <div class="g-title">Құрмет</div>
    <div class="g-text">Сіздерге үлкен алғысымызды білдіреміз.</div>
  </div>
  <div class="g-card">
    <div class="g-title">Алғыс</div>
    <div class="g-text">Еңбектеріңіз бағаланады.</div>
  </div>
</section>

<section class="qualities">
  <div class="pills">
    <div class="pill">Мейірімділік</div>
    <div class="pill">Сабырлық</div>
    <div class="pill">Жауапкершілік</div>
  </div>
</section>

<section class="wishes">
  <h2>Ізгі тілектер</h2>
  <div class="wishes-grid">
    <div class="w-card">Денсаулық</div>
    <div class="w-card">Бақыт</div>
    <div class="w-card">Табыс</div>
    <div class="w-card">Қуаныш</div>
  </div>
</section>

<footer class="footer">
  © 2026
</footer>

</body>
</html>
